<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=0,viewport-fit=cover"/>
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title> BATCH RECORD </title>

    <!-- -- PREMIUM TYPOGRAPHY -- -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@700;900&family=Cinzel:wght@700;900&family=Cormorant+Garamond:ital,wght@0,300;0,600;1,400&family=Orbitron:wght@700;900&family=Playfair+Display:ital,wght@0,700;0,900;1,400&family=DM+Sans:wght@400;500;700&family=MedievalSharp&display=swap" rel="stylesheet"/>

    <!-- -- ANIMATION ENGINES -- -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/ScrollTrigger.min.js"></script>

    <style>
        :root {
            --imperial-purple: #1A0F1F;
            --royal-blue:      #0A192F; 
            --gold:            #C9A84C;
            --gold-bright:     #F5E3A6;
            --gold-dark:       #8A6D2E;
            --mahogany:        #4A2C2A;
            --creme:           #FAF6EE;
            --stone:           #D1C7B7;
            --ink:             #1A1A1A;
            --pure-white:      #FFFFFF;
        }

        /* -- MASTER RESET & SECURITY -- */
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        
        body {
            background-color: var(--creme);
            background-image: 
                radial-gradient(circle at 50% 50%, transparent 0%, rgba(201, 168, 76, 0.05) 100%),
                url('https://www.transparenttextures.com/patterns/natural-paper.png');
            font-family: 'DM Sans', sans-serif;
            overflow-x: hidden;
            color: var(--ink);
            min-height: 100vh;
            -webkit-font-smoothing: antialiased;
        }

        /* -- GOD-LEVEL REDIRECT (REWINDING) -- */
        #page-loader {
            position: fixed; inset: 0; z-index: 1000000;
            background: var(--royal-blue);
            transform: translateX(-100%);
            display: flex; align-items: center; justify-content: center;
            border-right: 8px solid var(--gold);
            box-shadow: 20px 0 60px rgba(0,0,0,0.6);
            pointer-events: none;
        }
        .loader-logo { 
            font-family: 'Cinzel Decorative'; 
            font-size: clamp(24px, 6vw, 45px); 
            color: var(--gold); 
            letter-spacing: 15px; 
            font-weight: 900;
            text-shadow: 0 0 30px rgba(201, 168, 76, 0.6);
        }

        /* -- SECURITY VAULT -- */
        #sec-shield {
            position: fixed; inset: 0; z-index: 10000000;
            background: #000; display: none; align-items: center; justify-content: center;
        }
        .lock-ring { width: 70px; height: 70px; border: 4px solid rgba(201,168,76,0.1); border-top: 4px solid var(--gold); border-radius: 50%; animation: spin 0.8s linear infinite; }
        @keyframes spin { 100% { transform: rotate(360deg); } }

        /* -- TOP IMPERIAL STRAP (Purple & Gold) -- */
        .strap {
            position: sticky; top: 0; z-index: 1000; width: 100%; height: 65px;
            background: linear-gradient(90deg, #000 0%, var(--imperial-purple) 50%, #000 100%);
            display: flex; align-items: center; justify-content: center;
            border-bottom: 4px solid var(--gold);
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }
        .strap-text { font-family: 'Orbitron'; font-size: 11px; font-weight: 900; letter-spacing: 6px; color: var(--gold); text-transform: uppercase; }

        /* -- SIDEBAR MENU -- */
        .ham-btn {
            position: absolute; left: 18px; top: 50%; transform: translateY(-50%);
            width: 40px; height: 40px; display: flex; flex-direction: column; align-items:center; justify-content:center; gap:5px;
            cursor: pointer; background:none; border:none; z-index: 2001;
        }
        .ham-btn span { display: block; width: 22px; height: 2px; background: var(--gold); border-radius: 2px; transition: 0.3s; }
        .ham-btn.open span:nth-child(1) { transform: translateY(7px) rotate(45deg); }
        .ham-btn.open span:nth-child(2) { opacity: 0; }
        .ham-btn.open span:nth-child(3) { transform: translateY(-7px) rotate(-45deg); }

        .nav-backdrop { position: fixed; inset: 0; background: rgba(0,0,0,0.8); z-index: 1500; display: none; backdrop-filter: blur(10px); }
        .nav-drawer {
            position: fixed; top: 0; left: 0; bottom: 0; width: 340px; max-width: 85%;
            background: var(--royal-blue);
            z-index: 2000; transform: translateX(-100%); transition: 0.6s cubic-bezier(0.77, 0, 0.18, 1);
            border-right: 5px solid var(--gold);
            display: flex; flex-direction: column;
        }
        .nav-drawer.open { transform: translateX(0); }
        .nav-header { 
            padding: 60px 40px 30px; border-bottom: 1px solid rgba(201,168,76,0.1);
            font-family: 'Cinzel Decorative'; color: var(--gold); font-size: 26px; font-weight: 900;
        }
        .nav-links { list-style: none; padding: 40px; flex-grow: 1; }
        .nav-links li { margin-bottom: 35px; }
        .nav-links a { 
            color: var(--gold-bright); text-decoration: none; font-family: 'Cinzel'; 
            font-size: 18px; letter-spacing: 3px; font-weight: 700; transition: 0.3s;
            display: block; position: relative;
        }
        .nav-links a:hover { color: var(--pure-white); padding-left: 15px; }

        /* -- HERO -- */
        .hero { text-align: center; padding: 120px 5% 80px; position: relative; }
        .hero-title {
            font-family: 'Playfair Display', serif; font-size: clamp(50px, 12vw, 110px);
            font-weight: 900; letter-spacing: -2px; text-transform: uppercase;
            color: var(--mahogany); line-height: 0.85;
        }
        .hero-title span { display: block; font-family: 'Cinzel Decorative'; font-size: 0.25em; color: var(--gold); letter-spacing: 18px; margin-top: 20px; }

        /* -- GAME CARDS (Imperial UI) -- */
        .section-title { font-family: 'Cinzel', serif; text-align: center; margin-top: 100px; color: var(--mahogany); font-size: 26px; letter-spacing: 10px; text-transform: uppercase; }
        .ornament { width: 120px; height: 3px; background: var(--gold); margin: 20px auto 60px; position: relative; }
        .ornament::before { content: '⚜'; position: absolute; top: -10px; left: 50%; transform: translateX(-50%); background: var(--creme); padding: 0 10px; color: var(--gold); }

        .mentor-grid { display: flex; justify-content: center; gap: 40px; padding: 0 5%; flex-wrap: wrap; }
        .mentor-card { 
            width: 320px; background: var(--creme); 
            border: 10px solid var(--mahogany); 
            outline: 2px solid var(--gold);
            padding: 12px; transition: 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            box-shadow: 15px 15px 0px var(--stone);
            cursor: pointer;
        }
        .mentor-card:hover { transform: translateY(-15px); box-shadow: 25px 25px 0px var(--gold); }
        .mentor-photo { width: 100%; aspect-ratio: 4/5; background: var(--royal-blue); border: 1px solid var(--gold); overflow: hidden; position: relative; }
        .mentor-photo img { width: 100%; height: 100%; object-fit: cover; transition: 1s; }
        
        .mentor-info { text-align: center; padding-top: 20px; }
        .mentor-name { font-family: 'Cinzel'; font-size: 15px; font-weight: 900; color: var(--ink); letter-spacing: 1px; }
        .mentor-rank { font-family: 'MedievalSharp'; font-size: 11px; color: var(--gold-dark); letter-spacing: 4px; margin-top: 8px; text-transform: uppercase; }

        /* -- STUDENT GRID -- */
        .search-wrap { padding: 50px 10%; text-align: center; }
        #search { 
            width: 100%; max-width: 500px; padding: 18px 25px; 
            border: 2px solid var(--gold); background: var(--pure-white); 
            font-family: 'Cinzel'; outline: none; font-size: 1.1rem;
            box-shadow: 10px 10px 30px rgba(0,0,0,0.05);
        }

        .grid {
            display: grid; 
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); 
            gap: 30px; padding: 0 6% 150px; max-width: 1600px; margin: 0 auto;
        }

        .card { 
            background: var(--pure-white); border: 1px solid var(--stone); 
            cursor: pointer; transition: 0.4s; position: relative;
            overflow: hidden;
        }
        .card:hover { border-color: var(--gold); transform: translateY(-10px); box-shadow: 0 20px 40px rgba(0,0,0,0.1); }
        
        /* Sweep Effect */
        .card::after {
            content: ''; position: absolute; top: 0; left: -100%; width: 50%; height: 100%;
            background: linear-gradient(to right, transparent, rgba(255,255,255,0.7), transparent);
            transform: skewX(-25deg); transition: 0.6s; z-index: 5;
        }
        .card:hover::after { left: 150%; }

        .card-photo { 
            width: 100%; aspect-ratio: 4/5; background: var(--royal-blue); 
            position: relative; overflow: hidden; border-bottom: 2px solid var(--stone);
        }
        .card-photo img { width: 100%; height: 100%; object-fit: cover; opacity: 0.85; transition: 0.8s; }
        .card:hover img { opacity: 1; transform: scale(1.08); }
        .card-initial { position: absolute; inset: 0; display: flex; align-items: center; justify-content: center; font-family: 'Cinzel'; font-size: 80px; color: var(--gold); opacity: 0.1; }

        .card-info { padding: 22px 15px; text-align: left; background: var(--creme); }
        .card-name { font-family: 'Cinzel'; font-size: 14px; font-weight: 900; letter-spacing: 1px; color: var(--ink); text-transform: uppercase; }
        .card-meta { font-family: 'Cormorant Garamond'; font-size: 11px; font-weight: 700; color: var(--gold-dark); text-transform: uppercase; margin-top: 5px; }

        /* -- FOOTER -- */
        .footer { text-align: center; padding: 120px 0; background: var(--mahogany); border-top: 6px solid var(--gold); }
        .footer p { font-family: 'Cinzel Decorative'; font-size: 12px; letter-spacing: 6px; color: var(--gold-bright); opacity: 0.8; }
        #dust { position: fixed; inset: 0; z-index: 0; pointer-events: none; opacity: 0.4; }

        /* -- MOBILE UI -- */
        @media (max-width: 768px) {
            .grid { grid-template-columns: repeat(2, 1fr); gap: 12px; padding: 0 12px 100px; }
            .hero-title { font-size: clamp(45px, 15vw, 65px); }
            .card-name { font-size: 11px; }
            .mentor-card { width: calc(50% - 15px); border-width: 4px; box-shadow: 6px 6px 0px var(--stone); }
            .m-name { font-size: 10px; }
            .strap-text { letter-spacing: 3px; font-size: 10px; }
            .nav-drawer { width: 300px; }
        }
    </style>
</head>
<body oncontextmenu="return false;">

    <!-- -- AUDIO SYSTEM -- -->
    <audio id="aoeClick" preload="auto">
        <source src="AUDIO/bigbutton.wav" type="audio/wav">
    </audio>

    <!-- -- REWINDING REDIRECT OVERLAY -- -->
    <div id="page-loader"><div class="loader-logo">REWINDING...</div></div>

    <!-- -- SECURITY -- -->
    <div id="sec-shield"><div class="lock-ring"></div></div>

    <canvas id="dust"></canvas>

    <!-- -- SIDEBAR MENU -- -->
    <div class="nav-backdrop" id="nav-backdrop" onclick="toggleNav()"></div>
    <nav class="nav-drawer" id="nav-drawer">
        <div class="nav-header"> ACCESS PANEL </div>
        <ul class="nav-links">
            <li><a href="javascript:void(0)" onclick="navigateTo('page1.html')"> HOME</a></li>
            <li><a href="javascript:void(0)" onclick="navigateTo('page4.html')">GALLERY</a></li>
            <li><a href="javascript:void(0)" onclick="scrollToMentors()">HALL OF MENTORS</a></li>
            <li><a href="javascript:void(0)" onclick="toggleNav()">  VIDEO VAULT (SOON)</a></li>
        </ul>
        <div style="padding: 40px; font-family:'Orbitron'; font-size:9px; color:var(--gold); letter-spacing:3px; opacity:0.6; line-height:2;">
            <br>BY JIVITMURDA
        </div>
    </nav>

    <!-- -- TOP STRAP -- -->
    <div class="strap">
        <button class="ham-btn" id="ham-btn" onclick="toggleNav()">
            <span></span><span></span><span></span>
        </button>
        <span class="strap-text">CAMPUS RECORDS {2026} </span>
    </div>

    <!-- -- HERO -- -->
    <header class="hero">
        <h1 class="hero-title">ACADEMIC<span>DIRECTORY</span></h1>
    </header>

    <!-- -- MENTORS -- -->
    <div id="mentors-anchor"></div>
    <h2 class="section-title">Hall of Mentors</h2>
    <div class="ornament"></div>
    <section class="mentor-grid" id="mentor-grid"></section>

    <!-- -- STUDENTS -- -->
    <h2 class="section-title">Student Archive</h2>
    <div class="ornament"></div>
    
    <div class="search-wrap">
        <input id="search" type="text" placeholder="Identify record..." oninput="filterCards()"/>
    </div>

    <section class="grid" id="grid"></section>

    <!-- -- FOOTER -- -->
    <footer class="footer">
        <p>DESIGNED BY JIVITMURDA</p>
    </footer>

    <script>
        /* -- AUDIO LOGIC -- */
        const clickSfx = document.getElementById('aoeClick');
        function playSfx() {
            clickSfx.currentTime = 0;
            clickSfx.play().catch(e => console.log("Audio play blocked."));
        }

        // Attach sound to every clickable element manually or via listener
        document.addEventListener('click', (e) => {
            if(e.target.closest('button, a, .card, .mentor-card, .ham-btn')) {
                playSfx();
            }
        });

        /* 
        =========================================
        DATA
        =========================================
        */
        const MENTOR_DATA = [
            { name: "PROF. RAHUL SIR", rank: "CHEM EXPERT", img: "pfp/mentor1.jpg" },
            { name: "PROF. ARUN SONAWANE SIR", rank: "MATHS EXPERT", img: "pfp/mentor2.jpg" }
        ];

        const STUDENT_DATA = [
            { name: "Abhinav Chauhan", meta: "SCHOLAR ", img: "pfp/abhinav.png" },
            { name: "Kunal Patne",     meta: "SCHOLAR", img: "" },
            { name: "Ishant Gawali",    meta: "SCHOLAR", img: "" },
            { name: "Jidnesh Kharole", meta: "SCHOLAR", img: "" }
        ];

        /* 
        =========================================
        CORE ENGINE
        =========================================
        */

        function renderMentors() {
            const mGrid = document.getElementById('mentor-grid');
            mGrid.innerHTML = MENTOR_DATA.map(m => `
                <div class="mentor-card">
                    <div class="mentor-photo">
                        <img src="${m.img}" onerror="this.src='https://via.placeholder.com/400x500/0A192F/C9A84C?text=MENTOR'">
                    </div>
                    <div class="mentor-info">
                        <div class="mentor-name">${m.name}</div>
                        <div class="mentor-rank">${m.rank}</div>
                    </div>
                </div>
            `).join('');
        }

        function renderCards(data) {
            const grid = document.getElementById('grid');
            grid.innerHTML = data.map(p => {
                const init = p.name.charAt(0).toUpperCase();
                const imgHtml = p.img ? `<img src="${p.img}" loading="lazy">` : `<div class="card-initial">${init}</div>`;
                
                return `
                <div class="card" onclick="navigateTo('profile.html')">
                    <div class="card-photo">${imgHtml}</div>
                    <div class="card-info">
                        <div class="card-name">${p.name}</div>
                        <div class="card-meta">${p.meta}</div>
                    </div>
                </div>`;
            }).join('');
            
            gsap.from(".card", { opacity: 0, y: 30, stagger: 0.05, duration: 0.8, ease: "power2.out" });
        }

        function filterCards(){
            const q = document.getElementById('search').value.toLowerCase();
            const filtered = STUDENT_DATA.filter(x => x.name.toLowerCase().includes(q));
            renderCards(filtered);
        }

        /* -- INTERACTION -- */
        function toggleNav() {
            const d = document.getElementById('nav-drawer');
            const b = document.getElementById('nav-backdrop');
            const h = document.getElementById('ham-btn');
            d.classList.toggle('open');
            h.classList.toggle('open');
            b.style.display = d.classList.contains('open') ? 'block' : 'none';
        }

        function scrollToMentors() {
            toggleNav();
            document.getElementById('mentors-anchor').scrollIntoView({ behavior: 'smooth' });
        }

        /* -- NAVIGATION REDIRECT -- */
        function navigateTo(url) {
            const loader = document.getElementById('page-loader');
            gsap.set(loader, { x: "-100%" });

            gsap.to(loader, { 
                x: "0%", 
                duration: 0.8, 
                ease: "power4.inOut", 
                onStart: () => {
                    loader.style.pointerEvents = "auto";
                },
                onComplete: () => {
                    window.location.href = url;
                }
            });
        }

        window.onload = () => {
            renderMentors();
            renderCards(STUDENT_DATA);
            
            gsap.registerPlugin(ScrollTrigger);
            gsap.from(".hero-title", { y: 100, opacity: 0, duration: 1.5, ease: "power4.out" });
            
            document.addEventListener('visibilitychange', () => {
                document.getElementById('sec-shield').style.display = document.hidden ? 'flex' : 'none';
            });
        };

        // DUST SYSTEM
        (function(){
            const c = document.getElementById('dust');
            const ctx = c.getContext('2d');
            let particles = [];
            function res() { c.width = window.innerWidth; c.height = window.innerHeight; }
            res(); window.onresize = res;
            for(let i=0; i<60; i++) particles.push({ x:Math.random()*c.width, y:Math.random()*c.height, r:Math.random()*2, v:Math.random()*0.3 });
            function draw(){
                ctx.clearRect(0,0,c.width,c.height);
                particles.forEach(p=>{
                    p.y -= p.v; if(p.y < 0) p.y = c.height;
                    ctx.beginPath(); ctx.arc(p.x, p.y, p.r, 0, Math.PI*2);
                    ctx.fillStyle = 'rgba(201, 168, 76, 0.3)'; ctx.fill();
                });
                requestAnimationFrame(draw);
            }
            draw();
        })();

        // SECURITY
        document.addEventListener('keydown', e => {
            if(e.ctrlKey && (e.key === 'u' || e.key === 's' || e.key === 'i')) e.preventDefault();
        });
    </script>
</body>
</html>
