<!DOCTYPE html>
<html lang="en">
<head>
  <script>
// This prevents the black screen when clicking the 'Back' button
window.onpageshow = function(event) {
    if (event.persisted) {
        window.location.reload();
    }
};
</script>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=0,viewport-fit=cover"/>
<title>Digital Gallery </title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@700;900&family=Cinzel:wght@400;700;900&family=Playfair+Display:ital,wght@0,400;0,700;1,400;1,700&family=DM+Sans:wght@300;400;500;700&family=Orbitron:wght@700;900&display=swap" rel="stylesheet"/>

<style>
:root {
  --gold: #C9A84C; --gold-bright: #E2C05A; --gold-dark: #7A5800; --gold-deep: #5A3E00;
  --text-dark: #000000; --text-soft: #2C1E00; --bg-base: #F2E8D4; --bg-card: #e5dcc7;
  --border: rgba(201,168,76,0.45); --shadow-lg: 0 20px 60px rgba(90,60,5,0.3);
}

*,*::before,*::after { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
body {
  background-color: var(--bg-base); font-family: 'DM Sans', sans-serif;
  min-height: 100vh; overflow-x: hidden; -webkit-user-select: none; user-select: none;
}

/* --- SUPREME SECURITY: INSTANT VANISH (MOBILE & DESKTOP) --- */
#sec-shield {
  position: fixed; inset: 0; z-index: 999999; background: #000; 
  display: none; align-items: center; justify-content: center;
}
#sec-shield p { color: var(--gold); font-family: 'Orbitron'; letter-spacing: 5px; font-size: 14px; text-align: center; padding: 20px; }
.locked #main-wrapper { filter: blur(30px); opacity: 0; }

/* DECOR ELEMENTS */
#dust { position: fixed; inset: 0; z-index: 0; pointer-events: none; opacity: 0.55; }
.bg-orb { position: fixed; width: 700px; height: 700px; border-radius: 50%; background: radial-gradient(circle,rgba(201,168,76,.15) 0%,transparent 70%); z-index: -1; filter: blur(100px); animation: floatOrb 22s infinite alternate ease-in-out; }
@keyframes floatOrb { from { transform: translate(-8%,-8%); } to { transform: translate(12%,8%); } }

/* --- ENTRY SCREEN --- */
#entry {
  position: fixed; inset: 0; z-index: 9000; display: flex; align-items: center; 
  justify-content: center; background: var(--bg-base); transition: 1.2s cubic-bezier(0.8, 0, 0.2, 1);
  padding: 20px;
}
#entry.gone { transform: scale(1.1); opacity: 0; pointer-events: none; }
.entry-card { background: var(--bg-card); border: 1px solid var(--gold-dark); padding: 60px 40px; text-align: center; box-shadow: var(--shadow-lg); width: 100%; max-width: 500px; border-radius: 4px; transition: 0.5s; }

.btn-enter { 
    padding: 18px 50px; background: linear-gradient(135deg,var(--gold-deep),var(--gold-dark),var(--gold)); 
    border: none; border-radius: 50px; font-family: 'Cinzel'; font-weight: 700; color: #fff; 
    cursor: pointer; letter-spacing: 4px; box-shadow: 0 10px 20px rgba(0,0,0,0.2);
    transition: 0.3s transform; width: auto;
}
.btn-enter:active { transform: scale(0.95); }

/* --- MAIN PAGE & CARDS --- */
#main-page { transition: opacity 1s ease-in; }
.top-bar { position: sticky; top: 0; z-index: 500; height: 75px; background: rgba(242,232,212,0.9); backdrop-filter: blur(20px); border-bottom: 2px solid var(--gold); display: flex; align-items: center; justify-content: space-between; padding: 0 28px; }

/* Fixed Grid for Mobile Interface */
.gallery-grid {
  display: grid; 
  grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
  gap: 35px; padding: 40px 5%; max-width: 1400px; margin: 0 auto;
}

.photo-card {
  background: var(--bg-card); padding: 12px 12px 50px 12px; border-radius: 2px;
  box-shadow: 0 15px 35px rgba(0,0,0,0.15); border: 1px solid var(--gold-dark);
  transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275), opacity 0.5s;
  cursor: pointer; position: relative; overflow: hidden;
  animation: cardFadeIn 0.6s ease forwards;
}
.photo-card img { width: 100%; height: 280px; object-fit: cover; border: 1px solid var(--gold-dark); display: block; filter: contrast(1.05); }
.card-caption { font-family: 'Cinzel'; font-weight: 900; text-align: center; margin-top: 15px; color: var(--text-dark); font-size: 14px; letter-spacing: 1px; }

/* --- MOBILE SPECIFIC FIXES --- */
@media (max-width: 768px) {
  .entry-card { padding: 40px 20px; }
  .btn-enter { width: 100%; padding: 18px 20px; }
  .top-bar { padding: 0 15px; height: 60px; }
  .gallery-grid { 
    grid-template-columns: repeat(2, 1fr); /* 2 per row on mobile for better visibility */
    gap: 12px; padding: 15px; 
  }
  .photo-card { padding: 8px 8px 35px 8px; }
  .photo-card img { height: 180px; }
  .card-caption { font-size: 10px; margin-top: 8px; }
  .upload-box { padding: 25px !important; margin: 15px auto !important; }
}

.upload-box { background: var(--bg-card); border: 2px dashed var(--gold-dark); border-radius: 4px; padding: 40px; text-align: center; cursor: pointer; width: 92%; max-width: 800px; margin: 20px auto; transition: 0.3s; }

/* --- LIGHTBOX --- */
#lightbox {
  position: fixed; inset: 0; z-index: 100000; background: #000; 
  display: none; align-items: center; justify-content: center;
}
.lb-wrap { width: 100vw; height: 100vh; display: flex; align-items: center; justify-content: center; position: relative; }
#lb-img { max-width: 100%; max-height: 100%; object-fit: contain; }
.slider-btn { position: absolute; top: 50%; transform: translateY(-50%); background: rgba(0,0,0,0.5); border: 1px solid var(--gold); color: var(--gold); width: 50px; height: 50px; border-radius: 50%; z-index: 100001; }
.btn-prev { left: 10px; } .btn-next { right: 10px; }
.lb-close { position: absolute; top: 20px; right: 20px; color: #fff; font-family: 'Orbitron'; font-size: 14px; border: 1px solid var(--gold); padding: 8px; z-index: 100002; }
</style>
</head>
<body oncontextmenu="return false;" ondragstart="return false;">

<div id="sec-shield"><p>ENCRYPTED VAULT: SECURITY PROTOCOL ACTIVE</p></div>

<div id="main-wrapper">
    <canvas id="dust"></canvas>
    <div class="bg-orb" style="top:-100px; left:-100px;"></div>
    
    <audio id="bg-audio" preload="auto"></audio>

    <div id="entry">
        <div class="entry-card" id="entry-ui"></div>
    </div>

    <div id="main-page" style="display:none;">
        <nav class="top-bar">
            <button class="btn-back" onclick="goBack()" style="background: none; border: 1.5px solid var(--gold); color: var(--gold-dark); padding: 8px 15px; border-radius: 50px; font-family: 'Cinzel'; font-weight: 700; cursor: pointer; font-size: 12px;">LEAVE</button>
            <div id="nav-badge" style="background:var(--gold); color:#000; padding:6px 15px; border-radius:50px; font-family:'Orbitron'; font-weight:900; font-size:10px;"></div>
        </nav>

        <div style="text-align:center; padding:40px 20px;">
            <h1 id="hero-main" style="font-family:'Cinzel Decorative'; font-size:clamp(30px, 8vw, 75px); font-weight:900;"></h1>
            <p id="hero-tag" style="font-family:'Playfair Display'; font-style:italic; font-size:16px; color:var(--gold-dark); margin-top:10px;"></p>
        </div>

        <div class="upload-box" onclick="document.getElementById('file-input').click()">
            <h3 style="font-family:'Cinzel'; color:var(--gold-dark); font-weight:900; font-size: 14px;">+ DEPOSIT NEW MEMORIES</h3>
            <input type="file" id="file-input" multiple accept="image/*" style="display:none;" onchange="handleUpload(event)">
        </div>

        <div class="gallery-grid" id="grid"></div>

        <footer style="text-align:center; padding:80px 20px; border-top:1px solid var(--border);">
            <div id="footer-year" style="font-family:'Cinzel Decorative'; font-size:40px; color:var(--gold);"></div>
            <p id="footer-note" style="font-family:'Orbitron'; font-size:9px; letter-spacing:4px; margin-top:10px;"></p>
        </footer>
    </div>
</div>

<div id="lightbox">
    <div class="lb-wrap">
        <div class="lb-close" onclick="closeLB()">CLOSE [X]</div>
        <button class="slider-btn btn-prev" onclick="moveSlide(-1)">&#10094;</button>
        <img id="lb-img" src="" alt="Full Memory">
        <button class="slider-btn btn-next" onclick="moveSlide(1)">&#10095;</button>
    </div>
</div>

<script>
let galleryItems = [];
let currentIndex = 0;
const aud = document.getElementById('bg-audio');

/* --- SECURITY: ANTI-SCREENSHOT ENGINE --- */
function lock() { 
    document.getElementById('sec-shield').style.display = 'flex'; 
    document.body.classList.add('locked'); 
}
function unlock() { 
    document.getElementById('sec-shield').style.display = 'none'; 
    document.body.classList.remove('locked'); 
}

// Mobile specific: detect app switching or minimizing (prevents quick screenshots)
document.addEventListener("visibilitychange", () => {
    if (document.hidden) {
        lock();
    } else {
        setTimeout(unlock, 500);
    }
});

window.addEventListener('blur', lock);
window.addEventListener('focus', unlock);

window.addEventListener('keyup', (e) => {
    if (e.key === 'PrintScreen') {
        navigator.clipboard.writeText("");
        lock();
        setTimeout(unlock, 2000);
    }
});

/* --- AUDIO ENGINE --- */
const TRACKS = Array.from({length: 23}, (_, i) => `AUDIO/audio${i+1}.${i === 11 ? 'mp4' : 'mpeg'}`);
let jukebox = [];
function playMusic() {
    if (jukebox.length === 0) jukebox = [...TRACKS].sort(() => Math.random() - 0.5);
    aud.src = jukebox.pop();
    aud.play().catch(e => {});
}
aud.onended = playMusic;

function openVault() {
    playMusic();
    document.getElementById('entry').classList.add('gone');
    document.getElementById('main-page').style.display = 'block';
    window.scrollTo(0,0);
}

function goBack() {
    document.getElementById('entry').classList.remove('gone');
    setTimeout(() => { document.getElementById('main-page').style.display = 'none'; }, 1000);
    aud.pause();
}

function handleUpload(e) {
    const files = Array.from(e.target.files);
    files.forEach(file => {
        const reader = new FileReader();
        reader.onload = (ev) => {
            const item = { src: ev.target.result };
            galleryItems.push(item);
            renderCard(item, galleryItems.length - 1);
        };
        reader.readAsDataURL(file);
    });
}

function renderCard(item, idx) {
    const grid = document.getElementById('grid');
    const div = document.createElement('div');
    div.className = 'photo-card';
    div.innerHTML = `
        <img src="${item.src}" onclick="openLB(${idx})">
        <div class="card-caption">MEMORIA NO. ${idx + 1}</div>
    `;
    grid.insertBefore(div, grid.firstChild);
}

function openLB(idx) {
    currentIndex = idx;
    document.getElementById('lb-img').src = galleryItems[currentIndex].src;
    document.getElementById('lightbox').style.display = 'flex';
}
function closeLB() { document.getElementById('lightbox').style.display = 'none'; }
function moveSlide(dir) {
    currentIndex = (currentIndex + dir + galleryItems.length) % galleryItems.length;
    document.getElementById('lb-img').src = galleryItems[currentIndex].src;
}

const CONFIG = {
    entryYear: "REWIND",
    entryShayari: "\"Kuch yaadein purani hain,<br>Magar dosti abhi nibhani hai.\"",
    entryButtonText: "Revisiting the Moment",
    navBadge: "BATCH OF 2026",
    heroTitle: "Digital Gallery",
    heroTagline: "A Legacy Stitched in Time and Memories.",
    footerYear: "BY ABHINAV CHAUHAN",
    footerNote: "Co Developer JIVITMURDA"
};

function init() {
    document.getElementById('entry-ui').innerHTML = `
        <div style="font-family:'Orbitron'; font-size:10px; letter-spacing:8px; color:var(--gold-dark); margin-bottom:20px;">PRIVATE ARCHIVE</div>
        <div style="font-family:'Cinzel Decorative'; font-size:60px; font-weight:900; color:var(--gold-deep); line-height:1;">${CONFIG.entryYear}</div>
        <p style="font-family:'Playfair Display'; font-style:italic; font-size:20px; margin:40px 0 50px; line-height:1.6;">${CONFIG.entryShayari}</p>
        <button class="btn-enter" onclick="openVault()">${CONFIG.entryButtonText}</button>
    `;
    document.getElementById('nav-badge').textContent = CONFIG.navBadge;
    document.getElementById('hero-main').textContent = CONFIG.heroTitle;
    document.getElementById('hero-tag').textContent = CONFIG.heroTagline;
    document.getElementById('footer-year').textContent = CONFIG.footerYear;
    document.getElementById('footer-note').textContent = CONFIG.footerNote;
}

init();
</script>
</body>
</html>
