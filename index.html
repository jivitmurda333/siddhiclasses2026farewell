<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Farewell 2026 | Entrance</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&display=swap" rel="stylesheet">

    <style>
        :root {
            --gold-solid: #D4AF37;
            --gold-dark:  #996515;
            --bg-dark:    #0A0A0A;
        }

        #page-transition {
            position:fixed; inset:0; background:#000; z-index:9999;
            transition:opacity 1.5s ease; pointer-events:none; opacity:1;
        }
        body.loaded   #page-transition { opacity:0; }
        body.exiting  #page-transition { opacity:1; pointer-events:auto; }

        *,*::before,*::after { margin:0; padding:0; box-sizing:border-box; }

        body {
            margin:0; background-color:var(--bg-dark); overflow:hidden;
            height:100vh; display:flex; flex-direction:column; align-items:center;
            font-family:'Orbitron', sans-serif;
        }

        #video-bg {
            position:fixed; right:0; bottom:0;
            min-width:100%; min-height:100%;
            z-index:-1; object-fit:cover;
            filter:brightness(0.3) contrast(1.1) sepia(0.4);
        }
        .video-overlay {
            position:fixed; top:0; left:0; width:100%; height:100%;
            background:radial-gradient(circle, transparent 20%, rgba(0,0,0,0.9) 100%);
            z-index:0;
        }

        .top-strap {
            height:72px;
            background:linear-gradient(90deg, var(--gold-dark) 0%, var(--gold-solid) 50%, var(--gold-dark) 100%);
            width:100%;
            border-bottom:4px solid #000;
            display:flex; align-items:center; justify-content:center;
            color:#000; font-weight:900; font-size:22px;
            letter-spacing:10px; text-transform:uppercase;
            z-index:10; position:relative;
            box-shadow:0 10px 30px rgba(0,0,0,0.8);
            flex-shrink:0;
        }

        .content {
            flex-grow:1; display:flex; flex-direction:column;
            justify-content:center; align-items:center; text-align:center;
            z-index:5; padding-bottom:50px;
        }

        .main-title {
            color:#fff; font-weight:900;
            font-size:clamp(40px, 10vw, 110px);
            margin-bottom:60px; /* Space between title and button */
            text-shadow:0 0 40px rgba(212,175,55,0.7);
            letter-spacing:20px;
            animation:glowPulse 3s infinite alternate;
            text-transform:uppercase;
        }

        @keyframes glowPulse {
            from { text-shadow:0 0 20px rgba(212,175,55,0.4); transform:scale(0.97); }
            to   { text-shadow:0 0 60px rgba(212,175,55,0.9), 0 0 20px #fff; transform:scale(1); }
        }

        .enter-btn {
            padding:28px 90px;
            background-color:var(--gold-solid);
            color:#000; font-weight:900; font-size:18px;
            letter-spacing:6px; cursor:pointer;
            transition:all 0.4s cubic-bezier(0.175,0.885,0.32,1.275);
            text-decoration:none; text-transform:uppercase;
            box-shadow:0 0 50px rgba(212,175,55,0.5);
            border:none; font-family:'Orbitron',sans-serif;
            display: inline-block;
        }

        .enter-btn:hover {
            background-color:#fff;
            box-shadow:0 0 80px #fff;
            transform:translateY(-10px) scale(1.1);
            letter-spacing: 10px;
        }
    </style>
</head>
<body>

    <div id="page-transition"></div>

    <video autoplay muted loop id="video-bg">
        <source id="video-source" src="" type="video/mp4">
    </video>
    <div class="video-overlay"></div>

    <div class="top-strap">
        <span id="top-strap-text"></span>
    </div>

    <div class="content">
        <h1 class="main-title" id="main-title-text"></h1>
        
        <a href="javascript:void(0)" onclick="startFarewell()" class="enter-btn" id="button-label"></a>
    </div>

    <script>
        const CONFIG = {
            topBar:      "Batch of 2026",           
            mainHeading: "THE END",                 
            buttonText:  "CLICK TO UNLEASH",     
            nextPageUrl: "farewell.html",            
            videoLink:   "https://assets.mixkit.co/videos/preview/mixkit-stars-in-the-deep-space-1150-large.mp4"
        };

        window.addEventListener('load', () => document.body.classList.add('loaded'));

        function startFarewell(){
            document.body.classList.add('exiting');
            setTimeout(() => { window.location.href = CONFIG.nextPageUrl; }, 1200);
        }

        document.getElementById('top-strap-text').innerText = CONFIG.topBar;
        document.getElementById('main-title-text').innerText = CONFIG.mainHeading;
        document.getElementById('button-label').innerText    = CONFIG.buttonText;
        document.getElementById('video-source').src          = CONFIG.videoLink;
        document.getElementById('video-bg').load();
    </script>
</body>
</html>
