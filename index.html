<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Farewell 2026 | Entrance</title>
  
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Cinzel+Decorative:wght@700;900&family=Cinzel:wght@400;700;900&family=Cormorant+Garamond:ital,wght@0,300;0,600;1,300;1,400&family=DM+Sans:wght@300;400;500;700&display=swap" rel="stylesheet">

  <style>
    :root {
      --gold:        #C9A84C;
      --gold-bright: #F5DFA0;
      --gold-dark:   #8A6510;
      --bg-deep:     #0F0A00;
      --bg-gradient: linear-gradient(180deg, #1A1200 0%, #0F0A00 100%);
      --text-main:   #FAF6EE;
    }
 
    *, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }
    html, body { 
      width:100%; height:100%; 
      overflow:hidden; 
      background: var(--bg-deep);
      -webkit-font-smoothing: antialiased;
    }
 
    #page-transition {
      position:fixed; inset:0;
      background: var(--bg-deep);
      z-index:9999;
      transition: opacity 1.2s cubic-bezier(0.22,1,0.36,1);
      pointer-events:none; opacity:1;
    }
    body.loaded #page-transition { opacity:0; }
    body.exiting #page-transition { opacity:1; pointer-events:auto; }
 
    body {
      font-family:'DM Sans', sans-serif;
      display:flex; flex-direction:column; align-items:center;
      height: 100vh; height: 100dvh;
      color: var(--text-main);
      background: var(--bg-gradient);
    }
 
    #dust {
      position:fixed; inset:0; z-index:2;
      pointer-events:none; opacity:0.7;
    }
 
    #video-bg {
      position:fixed; inset:0;
      width: 100%; height: 100%;
      z-index:1; object-fit:cover;
      filter: brightness(0.15) sepia(1) saturate(0.9);
      opacity:0.7;
    }
 
    .video-overlay {
      position:fixed; inset:0;
      background: radial-gradient(circle at center, transparent 10%, rgba(15, 10, 0, 0.95) 100%);
      z-index:2; pointer-events:none;
    }
 
    .top-strap {
      position:relative; z-index:10;
      width:100%; 
      height: clamp(80px, 12vh, 100px);
      background: linear-gradient(90deg, #4A3300, var(--gold-dark), var(--gold), var(--gold-bright), var(--gold), var(--gold-dark), #4A3300);
      background-size: 200% auto;
      border-bottom: 3px solid var(--gold-dark);
      display:flex; align-items:center; justify-content:center;
      box-shadow: 0 10px 40px rgba(0,0,0,0.6);
      animation: strapDown 0.8s cubic-bezier(0.22,1,0.36,1) both, shimmer 4s infinite linear;
      padding-top: env(safe-area-inset-top, 0);
    }
    
    .top-strap span {
      font-family:'Orbitron', sans-serif;
      font-size: clamp(18px, 5vw, 26px); 
      font-weight: 900; 
      letter-spacing: clamp(10px, 3vw, 20px);
      color: #1A1200; 
      text-transform: uppercase;
      text-shadow: 0 2px 4px rgba(255,255,255,0.3);
      white-space: nowrap;
    }
 
    .content {
      flex: 1; z-index: 10;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      text-align: center; padding: 20px;
      perspective: 1200px;
      width: 100%;
    }
 
    .eyebrow {
      font-family:'Cormorant Garamond', serif;
      font-style:italic; font-weight: 300;
      font-size: clamp(18px, 4vw, 28px);
      color: var(--gold-bright);
      letter-spacing: 8px;
      margin-bottom: 15px;
      opacity: 0;
      animation: fadeUp 1s ease 0.6s forwards;
    }
 
    .main-title {
      font-family: 'Cinzel Decorative', cursive;
      font-weight: 900;
      font-size: clamp(65px, 20vw, 180px);
      color: var(--gold);
      letter-spacing: clamp(4px, 1.5vw, 25px);
      text-transform: uppercase;
      line-height: 0.9;
      margin-bottom: 30px;
      position: relative;
      transition: transform 0.1s ease-out;
      background: linear-gradient(to bottom, #FFF8E7 0%, var(--gold) 50%, var(--gold-dark) 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      filter: drop-shadow(0 0 20px rgba(201, 168, 76, 0.4));
      opacity: 0;
      animation: titleIn 1.2s cubic-bezier(0.22,1,0.36,1) 0.3s forwards;
    }
 
    .divider {
      display:flex; align-items:center;
      justify-content:center; gap: clamp(15px, 4vw, 30px);
      margin-bottom: clamp(40px, 8vh, 60px);
      opacity: 0;
      animation: fadeUp 1s ease 0.9s forwards;
      width: 100%;
    }
    .dline {
      width: clamp(60px, 15vw, 200px); height: 1.5px;
      background: linear-gradient(90deg, transparent, var(--gold));
    }
    .dline.r { background: linear-gradient(90deg, var(--gold), transparent); }
    .dgem {
      width: 12px; height: 12px;
      background: var(--gold-bright);
      transform: rotate(45deg);
      box-shadow: 0 0 20px var(--gold);
    }
 
    .enter-btn {
      font-family:'Orbitron', sans-serif;
      font-weight: 900;
      font-size: clamp(12px, 3vw, 16px);
      letter-spacing: 8px;
      text-transform: uppercase;
      color: #1A1200;
      text-decoration: none;
      padding: clamp(20px, 5vw, 28px) clamp(50px, 10vw, 90px);
      position: relative;
      background: linear-gradient(90deg, #7A5508, var(--gold), var(--gold-bright), var(--gold), #7A5508);
      background-size: 200% auto;
      border: none;
      box-shadow: 0 15px 40px rgba(0,0,0,0.5), inset 0 1px 0 rgba(255,255,255,0.4);
      transition: all 0.4s cubic-bezier(0.22, 1, 0.36, 1);
      opacity: 0;
      animation: fadeUp 1s ease 1.1s forwards;
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
    }
 
    .enter-btn:hover, .enter-btn:active {
      background-position: right center;
      transform: translateY(-5px) scale(1.05);
      box-shadow: 0 20px 50px rgba(201, 168, 76, 0.5);
      letter-spacing: 10px;
    }
 
    @keyframes strapDown {
      from { transform:translateY(-100%); }
      to   { transform:translateY(0); }
    }
    @keyframes titleIn {
      from { opacity:0; transform:scale(0.8) translateY(50px); letter-spacing:40px; }
      to   { opacity:1; transform:scale(1) translateY(0); letter-spacing:clamp(4px,1.5vw,25px); }
    }
    @keyframes fadeUp {
      from { opacity:0; transform:translateY(30px); }
      to   { opacity:1; transform:translateY(0); }
    }
    @keyframes shimmer {
      0% { background-position: 0% 50%; }
      100% { background-position: 200% 50%; }
    }
 
    @media (max-height: 700px) {
      .top-strap { height: 70px; }
      .main-title { margin-bottom: 15px; }
      .divider { margin-bottom: 30px; }
    }
  </style>
</head>
<body>

  <div id="page-transition"></div>
  <canvas id="dust"></canvas>

  <video autoplay muted loop playsinline id="video-bg">
    <source id="video-source" src="" type="video/mp4">
  </video>
  <div class="video-overlay"></div>

  <div class="top-strap">
    <span id="top-strap-text"></span>
  </div>

  <main class="content">
    <p class="eyebrow" id="eyebrow-text"></p>
    <h1 class="main-title" id="main-title-text"></h1>

    <div class="divider">
      <div class="dline"></div>
      <div class="dgem"></div>
      <div class="dline r"></div>
    </div>

    <button onclick="startFarewell()" class="enter-btn" id="button-label"></button>
  </main>

  <script>
    const title = document.getElementById('main-title-text');
    
    document.addEventListener('mousemove', (e) => {
      const x = (window.innerWidth / 2 - e.pageX) / 40;
      const y = (window.innerHeight / 2 - e.pageY) / 40;
      title.style.transform = `rotateY(${x}deg) rotateX(${-y}deg) translateZ(30px)`;
    });

    if (window.innerWidth < 1024) {
      let angle = 0;
      function animateMobile() {
        angle += 0.02;
        const x = Math.sin(angle) * 5;
        const y = Math.cos(angle) * 5;
        title.style.transform = `rotateY(${x}deg) rotateX(${y}deg) translateZ(20px)`;
        requestAnimationFrame(animateMobile);
      }
      animateMobile();
    }

    (function(){
      var c = document.getElementById('dust');
      var ctx = c.getContext('2d');
      var st = [];
      function resize(){ c.width = window.innerWidth; c.height = window.innerHeight; }
      resize();
      window.addEventListener('resize', resize);
      
      for(var i=0; i<150; i++){
        st.push({
          x:  Math.random() * window.innerWidth,
          y:  Math.random() * window.innerHeight,
          r:  Math.random() * 1.5 + 0.3,
          a:  Math.random(),
          sp: Math.random() * 0.005 + 0.002,
          d:  Math.random() > 0.5 ? 1 : -1,
          vx: (Math.random() - 0.5) * 0.3,
          vy: (Math.random() - 0.5) * 0.15
        });
      }
      (function draw(){
        ctx.clearRect(0, 0, c.width, c.height);
        st.forEach(function(s){
          s.a += s.sp * s.d;
          if(s.a >= 1 || s.a <= 0) s.d *= -1;
          s.x = (s.x + s.vx + c.width) % c.width;
          s.y = (s.y + s.vy + c.height) % c.height;
          ctx.beginPath();
          ctx.arc(s.x, s.y, s.r, 0, Math.PI * 2);
          ctx.fillStyle = `rgba(201, 168, 76, ${s.a.toFixed(2)})`;
          ctx.fill();
        });
        requestAnimationFrame(draw);
      })();
    })();

    const CONFIG = {
      topBar:      "Batch of 2026",
      eyebrow:     "A Journey to Remember",
      mainHeading: "THE END",
      buttonText:  "CLICK TO UNLEASH",
      nextPageUrl: "farewell.html",
      videoLink:   "https://assets.mixkit.co/videos/preview/mixkit-stars-in-the-deep-space-1150-large.mp4"
    };

    window.addEventListener('load', () => {
      document.body.classList.add('loaded');
      document.getElementById('video-bg').load();
    });

    function startFarewell(){
      document.body.classList.add('exiting');
      setTimeout(() => {
        window.location.href = CONFIG.nextPageUrl;
      }, 1200);
    }

    document.getElementById('top-strap-text').innerText = CONFIG.topBar;
    document.getElementById('eyebrow-text').innerText   = CONFIG.eyebrow;
    document.getElementById('main-title-text').innerText= CONFIG.mainHeading;
    document.getElementById('button-label').innerText   = CONFIG.buttonText;
    document.getElementById('video-source').src         = CONFIG.videoLink;
  </script>
</body>
</html>
