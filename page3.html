<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=0,viewport-fit=cover"/>
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>BATCH RECORD</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@700;900&family=Cinzel:wght@700;900&family=Cormorant+Garamond:ital,wght@0,300;0,600;1,400&family=Orbitron:wght@700;900&family=Playfair+Display:ital,wght@0,700;0,900;1,400&family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet"/>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/ScrollTrigger.min.js"></script>

    <style>
        :root {
            /* ── CORE PALETTE ── */
            --imperial-purple: #1A0F1F;
            --royal-blue:      #0A192F;
            --gold:            #C9A84C;
            --gold-bright:     #F5E3A6;
            --gold-dark:       #8A6D2E;
            --mahogany:        #4A2C2A;
            --creme:           #FAF6EE;
            --stone:           #D1C7B7;
            --ink:             #1A1A1A;
            --pure-white:      #FFFFFF;

            /* ── LOVE / WARM ACCENT (new subtle additions) ── */
            --rose:            #C0616A;
            --rose-dim:        #8B3A42;
            --rose-pale:       #F7E8E9;
            --blush:           #E8A598;
            --strap-grad-l:    #1a0a0c;
            --strap-grad-m:    #2e0e14;
        }

        *, *::before, *::after {
            margin: 0; padding: 0; box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        html { scroll-behavior: smooth; -webkit-overflow-scrolling: touch; }

        body {
            background-color: var(--creme);
            font-family: 'DM Sans', sans-serif;
            overflow-x: hidden; color: var(--ink);
            min-height: 100vh;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
            will-change: scroll-position;
        }

        /* paper texture */
        body::before {
            content: ''; position: fixed; inset: 0; z-index: -1;
            background-image:
                repeating-linear-gradient(0deg, transparent, transparent 28px, rgba(201,168,76,0.03) 28px, rgba(201,168,76,0.03) 29px),
                repeating-linear-gradient(90deg, transparent, transparent 28px, rgba(201,168,76,0.02) 28px, rgba(201,168,76,0.02) 29px);
            pointer-events: none;
        }

        /* ── PAGE LOADER ── */
        #page-loader {
            position: fixed; inset: 0; z-index: 1000000;
            background: var(--royal-blue);
            transform: translateX(-100%);
            display: flex; align-items: center; justify-content: center;
            border-right: 8px solid var(--gold);
            box-shadow: 20px 0 60px rgba(0,0,0,0.6);
            pointer-events: none; will-change: transform;
        }
        .loader-logo {
            font-family: 'Cinzel Decorative';
            font-size: clamp(18px, 5vw, 45px);
            color: var(--gold); letter-spacing: 10px; font-weight: 900;
            text-shadow: 0 0 30px rgba(201,168,76,0.6);
        }

        /* ── SECURITY SHIELD ── */
        #sec-shield {
            position: fixed; inset: 0; z-index: 10000000;
            background: #000; display: none;
            align-items: center; justify-content: center;
        }
        .lock-ring {
            width: 70px; height: 70px;
            border: 4px solid rgba(201,168,76,0.15);
            border-top: 4px solid var(--gold);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            will-change: transform;
        }
        @keyframes spin { 100% { transform: rotate(360deg); } }

        /* ── DUST CANVAS ── */
        #dust { position: fixed; inset: 0; z-index: 0; pointer-events: none; opacity: 0.4; }

        /* ════════════════════════════════
           TOP STRAP — warm rose/crimson
        ════════════════════════════════ */
        .strap {
            position: sticky; top: 0; z-index: 1000; width: 100%;
            height: clamp(55px, 8vh, 68px);
            background: linear-gradient(90deg,
                var(--strap-grad-l) 0%,
                var(--strap-grad-m) 35%,
                #3d0e18 50%,
                var(--strap-grad-m) 65%,
                var(--strap-grad-l) 100%);
            display: flex; align-items: center; justify-content: center;
            /* double border: gold bottom + a thin rose glow on top */
            border-bottom: 4px solid var(--gold);
            border-top: 2px solid var(--rose-dim);
            box-shadow: 0 4px 24px rgba(192,97,106,0.35), 0 2px 8px rgba(0,0,0,0.6);
            padding-top: env(safe-area-inset-top, 0);
            will-change: transform;
        }
        .strap-text {
            font-family: 'Orbitron'; font-size: clamp(9px, 2.5vw, 11px);
            font-weight: 900; letter-spacing: clamp(2px, 1vw, 6px);
            color: var(--gold); text-transform: uppercase;
            /* subtle rose tinge in the glow */
            text-shadow: 0 0 18px rgba(192,97,106,0.5), 0 0 30px rgba(201,168,76,0.4);
        }

        /* ── HAMBURGER ── */
        .ham-btn {
            position: absolute; left: 18px; top: 50%; transform: translateY(-50%);
            width: 44px; height: 44px;
            display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 6px;
            cursor: pointer; background: none; border: none; z-index: 2001;
        }
        .ham-btn span {
            display: block; width: 22px; height: 2px;
            background: var(--gold); border-radius: 2px;
            transition: transform 0.35s cubic-bezier(0.77,0,0.18,1), opacity 0.35s ease;
            will-change: transform;
        }
        .ham-btn.open span:nth-child(1) { transform: translateY(8px) rotate(45deg); }
        .ham-btn.open span:nth-child(2) { opacity: 0; transform: scaleX(0); }
        .ham-btn.open span:nth-child(3) { transform: translateY(-8px) rotate(-45deg); }

        /* ── NAV BACKDROP & DRAWER ── */
        .nav-backdrop {
            position: fixed; inset: 0; background: rgba(0,0,0,0.8);
            z-index: 1500; display: none;
            backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px);
            opacity: 0; transition: opacity 0.4s ease;
        }
        .nav-backdrop.visible { opacity: 1; }
        .nav-drawer {
            position: fixed; top: 0; left: 0; bottom: 0;
            width: 320px; max-width: 85%;
            background: var(--royal-blue); z-index: 2000;
            transform: translateX(-100%);
            transition: transform 0.5s cubic-bezier(0.77, 0, 0.18, 1);
            border-right: 5px solid var(--gold);
            display: flex; flex-direction: column;
            overflow-y: auto; will-change: transform;
        }
        .nav-drawer.open { transform: translateX(0); }
        .nav-header {
            padding: clamp(50px, 8vh, 70px) 30px 25px;
            border-bottom: 1px solid rgba(201,168,76,0.15);
            font-family: 'Cinzel Decorative'; color: var(--gold);
            font-size: clamp(18px, 5vw, 26px); font-weight: 900;
        }
        .nav-links { list-style: none; padding: clamp(25px, 5vh, 40px) 30px; flex-grow: 1; }
        .nav-links li { margin-bottom: clamp(22px, 4vh, 35px); }
        .nav-links a {
            color: var(--gold-bright); text-decoration: none; font-family: 'Cinzel';
            font-size: clamp(14px, 4vw, 18px); letter-spacing: 3px; font-weight: 700;
            transition: color 0.25s ease, padding-left 0.25s cubic-bezier(0.34,1.56,0.64,1), border-color 0.25s ease;
            display: flex; align-items: center; gap: 10px; padding: 8px 0;
            border-bottom: 1px solid rgba(201,168,76,0.1);
        }
        .nav-links a:hover { color: var(--pure-white); padding-left: 15px; border-bottom-color: rgba(201,168,76,0.4); }
        .nav-links a .nav-icon { font-size: 16px; opacity: 0.7; width: 20px; text-align: center; }
        .nav-footer { padding: 20px 30px 40px; font-family: 'Orbitron'; font-size: 9px; color: var(--gold); letter-spacing: 3px; opacity: 0.6; line-height: 2; }

        /* ── HERO ── */
        .hero {
            text-align: center;
            padding: clamp(60px, 12vh, 120px) 5% clamp(40px, 8vh, 80px);
            position: relative;
        }
        .hero-title {
            font-family: 'Playfair Display', serif;
            font-size: clamp(44px, 12vw, 110px);
            font-weight: 900; letter-spacing: -2px; text-transform: uppercase;
            color: var(--mahogany); line-height: 0.85;
        }
        .hero-title span {
            display: block; font-family: 'Cinzel Decorative';
            font-size: 0.25em; color: var(--gold);
            letter-spacing: clamp(6px, 3vw, 18px); margin-top: 20px;
        }

        /* ── SECTION TITLES ── */
        .section-title {
            font-family: 'Cinzel', serif; text-align: center;
            margin-top: clamp(60px, 10vh, 100px); color: var(--mahogany);
            font-size: clamp(16px, 4vw, 26px);
            letter-spacing: clamp(4px, 2vw, 10px); text-transform: uppercase;
        }
        .ornament {
            width: 120px; height: 3px; background: var(--gold);
            margin: 20px auto 40px; position: relative;
        }
        .ornament::before {
            content: '⚜'; position: absolute; top: -10px; left: 50%;
            transform: translateX(-50%);
            background: var(--creme); padding: 0 10px; color: var(--gold);
        }

        /* ════════════════════════════════════════════════
           MENTOR GRID — BIGGER FRAMES
           Desktop: 5 cols | Tablet/Mobile: 3 then 2 below
        ════════════════════════════════════════════════ */
        .mentor-grid {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: clamp(14px, 2.5vw, 36px);
            padding: 0 4%;
            max-width: 1200px;
            margin: 0 auto;
        }

        .mentor-card {
            background: var(--creme);
            border: clamp(5px, 1.4vw, 10px) solid var(--mahogany);
            outline: 2px solid var(--gold);
            padding: 10px;
            transition: transform 0.45s cubic-bezier(0.175, 0.885, 0.32, 1.275),
                        box-shadow 0.45s ease;
            box-shadow: clamp(6px, 1.5vw, 14px) clamp(6px, 1.5vw, 14px) 0px var(--stone);
            cursor: pointer; will-change: transform;
            display: flex; flex-direction: column;
        }
        .mentor-card:hover {
            transform: translateY(-14px);
            box-shadow: clamp(10px, 2.5vw, 22px) clamp(10px, 2.5vw, 22px) 0px var(--gold);
        }

        /* BIGGER photo frame — was 4/5, now 3/4 (taller) */
        .mentor-photo {
            width: 100%;
            aspect-ratio: 3/4;
            background: var(--royal-blue);
            border: 1px solid var(--gold);
            overflow: hidden; position: relative; flex-shrink: 0;
        }
        .mentor-photo img {
            width: 100%; height: 100%; object-fit: cover;
            object-position: center top;
            transition: transform 0.75s cubic-bezier(0.25,0.46,0.45,0.94);
            display: block;
        }
        .mentor-card:hover .mentor-photo img { transform: scale(1.06); }

        .mentor-placeholder {
            width: 100%; height: 100%;
            display: flex; flex-direction: column;
            align-items: center; justify-content: center;
            background: linear-gradient(135deg, var(--royal-blue), var(--imperial-purple));
        }
        .mentor-placeholder-initial {
            font-family: 'Cinzel'; font-size: clamp(36px, 7vw, 64px);
            color: var(--gold); opacity: 0.6; line-height: 1;
        }

        .mentor-info { text-align: center; padding: 14px 4px 6px; flex-grow: 1; display: flex; flex-direction: column; justify-content: center; }
        .mentor-name {
            font-family: 'Cinzel'; font-size: clamp(9px, 1.5vw, 13px);
            font-weight: 900; color: var(--ink); letter-spacing: 0.5px; line-height: 1.3;
        }
        .mentor-rank {
            font-family: 'DM Sans'; font-size: clamp(8px, 1.1vw, 10px);
            color: var(--rose-dim); letter-spacing: 2.5px; margin-top: 5px;
            text-transform: uppercase; font-weight: 700;
        }

        /* ── MOBILE ≤600px: row1 = 3 cols, row2 = 2 centred ── */
        @media (max-width: 600px) {
            .mentor-grid {
                grid-template-columns: repeat(3, 1fr);
                gap: 10px; padding: 0 10px; max-width: 100%;
            }
            /* 4th card: col 1 of row 2 */
            .mentor-card:nth-child(4) { grid-column: 1; grid-row: 2; }
            /* 5th card: col 3 of row 2 — leaves col 2 empty → looks centred with space */
            .mentor-card:nth-child(5) { grid-column: 3; grid-row: 2; }
        }

        /* Tablet 601–899px */
        @media (min-width: 601px) and (max-width: 899px) {
            .mentor-grid { grid-template-columns: repeat(3, 1fr); max-width: 100%; }
            .mentor-card:nth-child(4) { grid-column: 1; grid-row: 2; }
            .mentor-card:nth-child(5) { grid-column: 3; grid-row: 2; }
        }

        /* ── SEARCH ── */
        .search-wrap { padding: 40px 5% 30px; text-align: center; }
        #search {
            width: 100%; max-width: 480px;
            padding: clamp(13px, 3vw, 18px) clamp(16px, 4vw, 25px);
            border: 2px solid var(--gold); background: var(--pure-white);
            font-family: 'Cinzel'; outline: none;
            font-size: clamp(0.9rem, 3vw, 1.1rem);
            box-shadow: 8px 8px 24px rgba(0,0,0,0.06);
            border-radius: 2px;
            transition: box-shadow 0.3s ease, border-color 0.3s ease;
        }
        #search::placeholder { color: rgba(74,44,42,0.45); }
        #search:focus {
            box-shadow: 0 0 0 3px rgba(192,97,106,0.2), 8px 8px 24px rgba(0,0,0,0.06);
            border-color: var(--rose);
        }

        /* ════════════════════════════════════
           STUDENT GRID — bigger cards
        ════════════════════════════════════ */
        .grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: clamp(12px, 3vw, 32px);
            padding: 0 clamp(14px, 4%, 6%) clamp(80px, 15vh, 150px);
            max-width: 1600px; margin: 0 auto;
        }
        @media (min-width: 900px)  { .grid { grid-template-columns: repeat(4, 1fr); } }
        @media (min-width: 1200px) { .grid { grid-template-columns: repeat(5, 1fr); } }

        .card {
            background: var(--pure-white); border: 1px solid var(--stone);
            cursor: pointer;
            transition: transform 0.4s cubic-bezier(0.34, 1.56, 0.64, 1),
                        border-color 0.25s ease, box-shadow 0.4s ease;
            position: relative; overflow: hidden;
            border-radius: 18px; will-change: transform;
        }
        .card:hover {
            border-color: var(--rose); transform: translateY(-10px);
            box-shadow: 0 24px 48px rgba(192,97,106,0.18);
        }
        .card::after {
            content: ''; position: absolute; inset: 0;
            background: linear-gradient(110deg, transparent 30%, rgba(255,255,255,0.5) 50%, transparent 70%);
            transform: translateX(-100%) skewX(-15deg);
            transition: transform 0.65s cubic-bezier(0.25,0.46,0.45,0.94);
            z-index: 5; pointer-events: none;
        }
        .card:hover::after { transform: translateX(200%) skewX(-15deg); }

        /* BIGGER photo frame — was 4/5, now 3/4 */
        .card-photo {
            width: 100%;
            aspect-ratio: 3/4;
            background: var(--royal-blue);
            position: relative; overflow: hidden;
            border-bottom: 2px solid var(--stone);
            border-radius: 18px 18px 0 0;
        }
        .card-photo img {
            width: 100%; height: 100%; object-fit: cover;
            object-position: center top;
            opacity: 1;
            transition: transform 0.75s cubic-bezier(0.25,0.46,0.45,0.94);
            display: block;
            position: relative; z-index: 2;  /* sits above the initial letter */
        }
        .card:hover .card-photo img { transform: scale(1.07); }

        /* initial letter — hidden once real image loads */
        .card-initial {
            position: absolute; inset: 0;
            display: flex; align-items: center; justify-content: center;
            font-family: 'Cinzel'; font-size: clamp(56px, 16vw, 90px);
            color: var(--gold); opacity: 0.13; user-select: none;
            z-index: 1;  /* below the img */
        }
        /* when img loaded OK, hide the initial behind it — JS adds .has-photo */
        .card-photo.has-photo .card-initial { display: none; }

        .card-info {
            padding: clamp(16px, 3vw, 24px) clamp(12px, 3vw, 18px);
            text-align: left; background: var(--creme);
        }
        .card-name {
            font-family: 'Cinzel'; font-size: clamp(10px, 2.5vw, 14px);
            font-weight: 900; letter-spacing: 1px; color: var(--ink);
            text-transform: uppercase; line-height: 1.3;
        }
        .card-meta {
            font-family: 'Cormorant Garamond'; font-size: clamp(9px, 2vw, 11px);
            font-weight: 700; color: var(--rose-dim); text-transform: uppercase;
            margin-top: 6px; letter-spacing: 2px;
        }

        /* ── EMPTY STATE ── */
        .empty-state {
            grid-column: 1 / -1; text-align: center; padding: 60px 20px;
            font-family: 'Cinzel'; color: rgba(74,44,42,0.4);
            letter-spacing: 3px; font-size: 14px;
        }

        /* ── FOOTER ── */
        .footer {
            text-align: center;
            padding: clamp(60px, 12vh, 120px) 0;
            background: var(--mahogany);
            border-top: 6px solid var(--gold);
        }
        .footer p {
            font-family: 'Cinzel Decorative';
            font-size: clamp(9px, 2.5vw, 12px);
            letter-spacing: clamp(3px, 2vw, 6px);
            color: var(--gold-bright); opacity: 0.8;
        }

        /* ── TOUCH STATES ── */
        @media (hover: none) {
            .card:active { transform: scale(0.97); border-color: var(--rose); }
            .mentor-card:active { transform: scale(0.97); }
            .ham-btn:active { opacity: 0.7; }
        }

        /* ── RESPONSIVE OVERRIDES ── */
        @media (max-width: 480px) {
            .grid { grid-template-columns: repeat(3, 1fr); gap: 8px; padding: 0 8px 80px; }
            .card { border-radius: 12px; }
            .card-photo { border-radius: 12px 12px 0 0; }
            .card-info { padding: 8px 6px 10px; }
            .card-name { font-size: 8px; letter-spacing: 0.3px; }
            .card-meta { font-size: 7px; letter-spacing: 0.5px; margin-top: 2px; }
            .hero { padding: 50px 4% 40px; }
            .search-wrap { padding: 30px 12px 20px; }
            #search { font-size: 14px; padding: 13px 15px; }
            .section-title { margin-top: 50px; }
            .nav-drawer { width: 280px; }
            .nav-header { padding: 55px 22px 20px; }
            .nav-links { padding: 20px 22px; }
            .nav-links li { margin-bottom: 18px; }
            .nav-links a { font-size: 13px; letter-spacing: 2px; }
        }
        @media (min-width: 481px) and (max-width: 899px) {
            .grid { grid-template-columns: repeat(3, 1fr); gap: 12px; padding: 0 14px 90px; }
        }
    </style>
</head>

    <script>
        /* ── AUDIO ── */
        const clickSfx = document.getElementById('aoeClick');
        function playSfx() {
            clickSfx.currentTime = 0;
            clickSfx.play().catch(() => {});
        }
        document.addEventListener('click', e => {
            if (e.target.closest('button, a, .card, .mentor-card, .ham-btn')) playSfx();
        }, { passive: true });

        /* ── DATA ── */
        const MENTOR_DATA = [
            { name: "PROF. RAHUL SIR",         rank: "CHEM EXPERT",  img: "pfp/mentor1.JPG"  },
            { name: "PROF. ARUN SONAWANE SIR",  rank: "MATHS EXPERT", img: "pfp/mentor2.jpg"  },
            { name: "PROF. MAYUR SIR",          rank: "PHY EXPERT",   img: "pfp/mentor3.JPG"  },
            { name: "PROF. DARADE MAM",         rank: "BIO EXPERT",   img: "pfp/mentor4.JPG"  },
            { name: "PROF. SHRADHA MAM",        rank: "BIO EXPERT",   img: "pfp/mentor5.png"  }
        ];

        const STUDENT_DATA = [
            { name: "Abhinav Chauhan",  meta: "SCHOLAR", img: "pfp/abhinav.png" },
            { name: "Kunal Patne",      meta: "SCHOLAR", img: "pfp/kunal.jpeg"},
            { name: "Ishant Gawali",    meta: "SCHOLAR", img: ""                },
            { name: "Jidnesh Kharole",  meta: "SCHOLAR", img: ""                }
        ];

        /* ── RENDER MENTORS ── */
        function renderMentors() {
            const mGrid = document.getElementById('mentor-grid');
            mGrid.innerHTML = MENTOR_DATA.map(m => {
                const initial = m.name.replace('PROF. ', '').charAt(0).toUpperCase();
                const photoContent = m.img
                    ? `<img src="${m.img}" alt="${m.name}" loading="lazy" decoding="async"
                         onerror="this.parentElement.innerHTML='<div class=\\'mentor-placeholder\\'><div class=\\'mentor-placeholder-initial\\'>${initial}</div></div>'">`
                    : `<div class="mentor-placeholder"><div class="mentor-placeholder-initial">${initial}</div></div>`;
                return `
                <div class="mentor-card">
                    <div class="mentor-photo">${photoContent}</div>
                    <div class="mentor-info">
                        <div class="mentor-name">${m.name}</div>
                        <div class="mentor-rank">${m.rank}</div>
                    </div>
                </div>`;
            }).join('');

            gsap.from('.mentor-card', {
                opacity: 0, y: 40, scale: 0.95,
                stagger: 0.1, duration: 0.75, ease: 'power3.out'
            });
        }

        /* ── RENDER STUDENTS ──
           Key fix: initial letter sits BEHIND the img (z-index 1 vs 2).
           When the img loads successfully, we add .has-photo to .card-photo
           which hides the initial div entirely via CSS.
        ── */
        function renderCards(data) {
            const grid = document.getElementById('grid');
            if (!data.length) {
                grid.innerHTML = `<div class="empty-state">NO RECORDS FOUND</div>`;
                return;
            }
            grid.innerHTML = data.map(p => {
                const init = p.name.charAt(0).toUpperCase();
                let photoContent;
                if (p.img) {
                    // img is above initial via z-index; onload adds .has-photo to kill the letter
                    photoContent = `
                        <img src="${p.img}" loading="lazy" decoding="async" alt="${p.name}"
                             onload="this.closest('.card-photo').classList.add('has-photo')"
                             onerror="this.remove()">
                        <div class="card-initial">${init}</div>`;
                } else {
                    photoContent = `<div class="card-initial">${init}</div>`;
                }
                return `
                <div class="card" onclick="navigateTo('profile.html')">
                    <div class="card-photo">${photoContent}</div>
                    <div class="card-info">
                        <div class="card-name">${p.name}</div>
                        <div class="card-meta">${p.meta}</div>
                    </div>
                </div>`;
            }).join('');

            gsap.fromTo('.card',
                { opacity: 0, y: 28, scale: 0.97 },
                { opacity: 1, y: 0, scale: 1, stagger: 0.06, duration: 0.6, ease: 'power3.out', clearProps: 'all' }
            );
        }

        function filterCards() {
            const q = document.getElementById('search').value.toLowerCase().trim();
            renderCards(STUDENT_DATA.filter(x => x.name.toLowerCase().includes(q)));
        }

        /* ── NAV ── */
        let navOpen = false;
        function toggleNav() {
            navOpen = !navOpen;
            const drawer   = document.getElementById('nav-drawer');
            const backdrop = document.getElementById('nav-backdrop');
            const ham      = document.getElementById('ham-btn');

            if (navOpen) {
                backdrop.style.display = 'block';
                requestAnimationFrame(() => backdrop.classList.add('visible'));
            } else {
                backdrop.classList.remove('visible');
                backdrop.addEventListener('transitionend', () => {
                    if (!navOpen) backdrop.style.display = 'none';
                }, { once: true });
            }

            drawer.classList.toggle('open', navOpen);
            ham.classList.toggle('open', navOpen);
            document.body.style.overflow = navOpen ? 'hidden' : '';
        }

        function scrollToMentors() {
            if (navOpen) toggleNav();
            setTimeout(() => {
                document.getElementById('mentors-anchor').scrollIntoView({ behavior: 'smooth' });
            }, 400);
        }

        /* ── PAGE TRANSITION ── */
        function navigateTo(url) {
            const loader = document.getElementById('page-loader');
            gsap.set(loader, { x: '-100%', pointerEvents: 'none' });
            gsap.to(loader, {
                x: '0%', duration: 0.65, ease: 'power4.inOut',
                onStart()    { loader.style.pointerEvents = 'auto'; },
                onComplete() { window.location.href = url; }
            });
        }

        /* ── DUST PARTICLES ── */
        (function initDust() {
            const canvas = document.getElementById('dust');
            const ctx    = canvas.getContext('2d');
            let W, H;

            function resize() {
                W = canvas.width  = window.innerWidth;
                H = canvas.height = window.innerHeight;
            }
            resize();

            const particles = [];
            for (let i = 0; i < 50; i++) {
                particles.push({
                    x: Math.random() * window.innerWidth,
                    y: Math.random() * window.innerHeight,
                    r: Math.random() * 1.8 + 0.2,
                    v: Math.random() * 0.25 + 0.05,
                    o: Math.random() * 0.4 + 0.1
                });
            }

            let resizeTimer;
            window.addEventListener('resize', () => {
                clearTimeout(resizeTimer);
                resizeTimer = setTimeout(resize, 200);
            }, { passive: true });

            function draw() {
                ctx.clearRect(0, 0, W, H);
                ctx.fillStyle = '#C9A84C';
                for (const p of particles) {
                    p.y -= p.v;
                    if (p.y < -2) { p.y = H + 2; p.x = Math.random() * W; }
                    ctx.globalAlpha = p.o;
                    ctx.beginPath();
                    ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
                    ctx.fill();
                }
                ctx.globalAlpha = 1;
                requestAnimationFrame(draw);
            }
            draw();
        })();

        /* ── SCROLL ANIMATIONS ── */
        function initScrollAnimations() {
            gsap.registerPlugin(ScrollTrigger);
            gsap.from('.hero-title', {
                y: 80, opacity: 0, duration: 1.2, ease: 'power4.out'
            });
            gsap.from('.section-title, .ornament', {
                scrollTrigger: { trigger: '#mentors-anchor', start: 'top 85%' },
                opacity: 0, y: 30, stagger: 0.15, duration: 0.8, ease: 'power2.out'
            });
        }

        /* ── SECURITY ── */
        document.addEventListener('keydown', e => {
            if (e.ctrlKey && (e.key === 'u' || e.key === 's' || e.key === 'i')) e.preventDefault();
        });
        document.addEventListener('visibilitychange', () => {
            document.getElementById('sec-shield').style.display = document.hidden ? 'flex' : 'none';
        });

        /* ── INIT ── */
        if (document.readyState === 'loading') {
            document.addEventListener('DOMContentLoaded', boot);
        } else {
            boot();
        }

        function boot() {
            renderMentors();
            renderCards(STUDENT_DATA);
            initScrollAnimations();
        }
    </script>
</body>
</html>
